# Cellar PIM — local Docker Compose
#
# Database now lives on Supabase (cellar-pim, eu-central-1) — no local
# Postgres container. Create a `.env` file alongside this one (see
# .env.example) with at least DATABASE_URL and AUTH_SECRET set.
#
#   docker compose up
#
# pg-boss needs LISTEN/NOTIFY, so DATABASE_URL must be the DIRECT
# connection (port 5432, db.<ref>.supabase.co) — not the pooler.

services:
  api:
    build: .
    env_file: .env
    environment:
      PORT: 3000
      NODE_ENV: development
      # Override anything from .env here if needed, e.g.:
      # STORAGE_DRIVER: local
      # ASSET_DIR: /data/assets
    volumes:
      # Only needed when STORAGE_DRIVER=local. Remove this and the
      # volume below if STORAGE_DRIVER=supabase (fully stateless).
      - assets:/data/assets
    ports:
      - "3000:3000"
    # Migrations are applied separately (already done on Supabase).
    # To run them on startup instead, set RUN_MIGRATIONS=true in .env.
    command: sh -c '[ "$RUN_MIGRATIONS" = "true" ] && npx node-pg-migrate -m migrations up; node dist/index.js'

volumes:
  assets:
