# fly.toml — Cellar PIM API
# Region fra (Frankfurt) sits next to the Supabase project in eu-central-1.
#
# One-time setup:
#   fly launch --no-deploy --copy-config        # creates the app from this file
#   fly secrets set \
#     DATABASE_URL="postgres://postgres.qjwrwudbpydgadcglirk:[ENCODED-PASSWORD]@aws-0-eu-central-1.pooler.supabase.com:5432/postgres" \
#     AUTH_SECRET="$(openssl rand -hex 32)" \
#     SUPABASE_URL="https://qjwrwudbpydgadcglirk.supabase.co" \
#     SUPABASE_SERVICE_ROLE_KEY="[service_role key from Supabase dashboard → Settings → API]" \
#     CORS_ORIGIN="https://your-frontend.example"
#   fly deploy
#
# Notes:
# - DATABASE_URL must be the DIRECT connection (port 5432, db.<ref>.supabase.co):
#   pg-boss uses LISTEN/NOTIFY, which the transaction pooler (port 6543) doesn't support.
# - STORAGE_DRIVER=supabase makes the app stateless — no volume needed,
#   assets live in the private 'assets' bucket in Supabase Storage.

app = "cellar-pim-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Migrations run in a one-off release machine before the new version goes live
  release_command = "npx node-pg-migrate -m migrations up"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  STORAGE_DRIVER = "supabase"
  SUPABASE_BUCKET = "assets"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  # Background workers + scheduled jobs must keep running:
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/health/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Scaling out later: `fly scale count 2` is safe — rate limiting lives in
# Postgres, scheduled jobs take advisory locks, and storage is in Supabase,
# so instances share no local state.
