# fly.toml app configuration file generated for pim-pd-mxa on 2026-06-13T08:18:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pim-pd-mxa'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'npx node-pg-migrate -m migrations up'

[env]
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '3000'
  STORAGE_DRIVER = 'supabase'
  SUPABASE_BUCKET = 'assets'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health/ready'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
